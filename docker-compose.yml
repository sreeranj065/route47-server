# VPS / self-hosted deployment. Put HTTPS in front (e.g. Caddy with automatic
# TLS) — the Route47 driver app refuses plain-HTTP servers.
#
# Runs the OFFICIAL published image so you never maintain your own copy of
# the server code. Updating is:
#   docker compose pull && docker compose up -d
# (your data is safe — it lives in the route47-data volume).
#
# Developers only: `docker compose up --build` builds from local source via
# the `build:` fallback instead of pulling the image.
services:
  route47-server:
    image: ghcr.io/sreeranj065/route47-server:latest
    build: .
    restart: unless-stopped
    ports:
      - "4700:4700"
    environment:
      DATA_DIR: /data
      # Change this! Admin requests authenticate with X-Route47-Admin-Key.
      ROUTE47_ADMIN_API_KEY: change-me-to-a-long-random-string
      # Public HTTPS URL drivers should connect to (your Caddy/reverse-proxy domain).
      ROUTE47_PUBLIC_URL: https://route47.your-domain.example
      # Self-update (VPS only): mount docker.sock + compose dir below to enable.
      ROUTE47_HOSTING_MODE: docker
      ROUTE47_SELF_UPDATE_ENABLED: "true"
      ROUTE47_COMPOSE_DIR: /host-compose
      # Optional: PIN recovery email (or configure in Admin → Server → Email delivery)
      # EMAIL_FROM: Route47 <onboarding@resend.dev>
      # RESEND_API_KEY: re_xxxxxxxx
    volumes:
      - route47-data:/data
      # Uncomment for in-app self-update from the Admin App (VPS installs only):
      # - /var/run/docker.sock:/var/run/docker.sock
      # - .:/host-compose:ro

volumes:
  route47-data:
