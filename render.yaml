# Render Blueprint — one-click deploy via https://render.com/deploy?repo=<this repo>
# One web service, one persistent disk holding the SQLite DB + POD photo files.
#
# TARGET STATE (after the first tagged release publishes an image via
# .github/workflows/release.yml): switch this Blueprint to the official
# image so customer services track Route47 releases and never hold source —
# replace `runtime: docker` with:
#     runtime: image
#     image:
#       url: ghcr.io/sreeranj065/route47-server:latest
# Until that first release exists, the Docker source build below keeps the
# "Deploy to Render" button working exactly as today.
services:
  - type: web
    name: route47-server
    runtime: docker
    plan: starter # persistent disks require a paid instance (~$7/mo)
    healthCheckPath: /healthz
    disk:
      name: route47-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ROUTE47_HOSTING_MODE
        value: render
      - key: ROUTE47_ADMIN_API_KEY
        generateValue: true # random admin key per deploy; view it in the Render dashboard
      # Vendor / managed deploys only — do NOT put the real JSON in git.
      # Set in the Render dashboard (or via Route47 Deploy Broker in Phase 2)
      # so Admin owner-reconnect works after reinstall.
      - key: ROUTE47_FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
