# Release pipeline — the ONLY way official Route47 server artifacts are
# published. Customers deploy these images; they never build or fork the
# source. Trigger: push a version tag (e.g. `git tag v1.2.0 && git push --tags`).
#
# Publishes:
#   ghcr.io/<owner>/route47-server:<version>   (immutable, pinnable)
#   ghcr.io/<owner>/route47-server:latest      (what Railway/Render/VPS track)
# and creates a GitHub Release, which the Admin App reads (releases/latest)
# to show "Update available" against the version reported by /healthz.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/route47-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
